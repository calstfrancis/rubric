<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!--
    liturgy-planner-symbolic.svg
    Monochrome symbolic icon for use in GTK UI (headerbar, etc.)
    Uses currentColor so it respects light/dark mode automatically.
  -->

  <!-- Flame -->
  <path d="M 8 0.75
           C 6.8 2.2, 5.5 3.2, 5.75 4.7
           C 6 6, 7 6.5, 8 6.5
           C 9 6.5, 10 6, 10.25 4.7
           C 10.5 3.2, 9.2 2.2, 8 0.75 Z"
        fill="currentColor"/>

  <!-- Candle stub sitting on spine -->
  <rect x="7" y="6.25" width="2" height="2.75" rx="0.5"
        fill="currentColor" opacity="0.6"/>

  <!-- Left page -->
  <path d="M 1 6
           C 1 5.5, 4 5, 6.8 5
           L 6.8 14.5
           C 4 14.5, 1 14.2, 1 13.5
           Z"
        fill="currentColor" opacity="0.9"/>

  <!-- Right page -->
  <path d="M 15 6
           C 15 5.5, 12 5, 9.2 5
           L 9.2 14.5
           C 12 14.5, 15 14.2, 15 13.5
           Z"
        fill="currentColor" opacity="0.7"/>

  <!-- Spine line -->
  <rect x="6.7" y="5" width="2.6" height="9.5" rx="0.3"
        fill="currentColor" opacity="0.25"/>

</svg>
