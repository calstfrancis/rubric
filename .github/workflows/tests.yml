name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backend/data-layer tests
        run: |
          python3 -m unittest test_rcl_data test_bible_api -v
          python3 -m unittest discover -s tests -v

  gtk-panels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Uses the runner's system Python (no actions/setup-python) so the
      # apt-installed PyGObject bindings below are actually importable —
      # setup-python's isolated interpreter can't see system dist-packages.
      - name: Install GTK4/libadwaita
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-4.0 gir1.2-adw-1 xvfb

      - name: Verify GTK4/libadwaita import before running tests
        run: |
          python3 -c "import gi; gi.require_version('Gtk', '4.0'); gi.require_version('Adw', '1'); from gi.repository import Gtk, Adw; print('GTK4/libadwaita import OK')"

      - name: Run panel/exporter tests
        run: |
          xvfb-run -a python3 -m unittest tests.test_panels -v
