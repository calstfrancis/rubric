app-id: io.github.calstfrancis.rubric
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: rubric

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --filesystem=xdg-documents
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: rubric
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/calstfrancis/rubric.git
        branch: main
      - type: archive
        url: https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz
        sha256: a6044cbad2a954deb921167e257e120ac0a16b20339ec01121194ff9d394996d
        dest: typst-bin
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation .
      - install -Dm755 typst-bin/typst /app/bin/typst
      - install -Dm644 io.github.calstfrancis.rubric.desktop /app/share/applications/io.github.calstfrancis.rubric.desktop
      - install -Dm644 rubric.svg /app/share/icons/hicolor/scalable/apps/io.github.calstfrancis.rubric.svg
      - sed -i 's/^Icon=io.github.calstfrancis.rubric$/Icon=io.github.calstfrancis.rubric/' /app/share/applications/io.github.calstfrancis.rubric.desktop
      - install -Dm644 io.github.calstfrancis.rubric.metainfo.xml /app/share/metainfo/io.github.calstfrancis.rubric.metainfo.xml
